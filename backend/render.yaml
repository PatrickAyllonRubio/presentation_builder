services:
  - type: web
    name: cerv-api
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false          # Se configura manualmente en el dashboard de Render
      - key: GOOGLE_TTS_API_KEY
        sync: false
      - key: STORAGE_PATH
        value: ./storage
      - key: CORS_ORIGINS
        sync: false          # Ej: https://tu-app.vercel.app
      - key: PYTHON_VERSION
        value: "3.12.3"
